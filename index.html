<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加载中...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft Yahei', sans-serif;
      background-color: #f5f5f5;
      overflow: hidden;
    }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 18px;
      color: #666;
      margin-bottom: 10px;
    }
    
    .loading-subtext {
      font-size: 14px;
      color: #999;
    }
    
    #main-iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
    
    .error-container {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
    
    .error-icon {
      font-size: 60px;
      color: #e74c3c;
      margin-bottom: 20px;
    }
    
    .error-text {
      font-size: 20px;
      color: #333;
      margin-bottom: 10px;
    }
    
    .error-desc {
      font-size: 16px;
      color: #666;
      margin-bottom: 20px;
    }
    
    .retry-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
  </style>
</head>
<body>
  <!-- 加载界面 -->
  <div id="loading-container" class="loading-container">
    <div class="loading-spinner"></div>
    <div class="loading-text">加载中...</div>
    <div class="loading-subtext">请稍候，正在获取链接...</div>
  </div>
  
  <!-- 目标内容iframe -->
  <iframe id="main-iframe"></iframe>
  
  <!-- 错误界面 -->
  <div id="error-container" class="error-container">
    <div class="error-icon">⚠️</div>
    <div class="error-text">加载失败</div>
    <div class="error-desc">无法获取目标链接，请稍后重试</div>
    <button class="retry-btn" onclick="loadLink()">重试</button>
  </div>

  <script>
    async function loadLink() {
      try {
        // 显示加载界面
        document.getElementById('loading-container').style.display = 'flex';
        document.getElementById('error-container').style.display = 'none';
        document.getElementById('main-iframe').style.display = 'none';
        
        // 从API获取数据
        const response = await fetch('https://douyin.likeyunba.com/coze-landpage/do.php?key=Kc7Fq2');
        const data = await response.json();
        
        if (data.success && data.data && data.data.coze_jump) {
          // 隐藏加载界面，显示iframe
          document.getElementById('loading-container').style.display = 'none';
          const iframe = document.getElementById('main-iframe');
          iframe.src = data.data.coze_jump;
          iframe.style.display = 'block';
        } else {
          throw new Error('API返回数据格式不正确');
        }
      } catch (error) {
        console.error('加载失败:', error);
        // 显示错误界面
        document.getElementById('loading-container').style.display = 'none';
        document.getElementById('error-container').style.display = 'flex';
      }
    }
    
    // 页面加载完成后自动加载链接
    window.onload = loadLink;
  </script>
</body>
</html>
